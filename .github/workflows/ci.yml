name: PWA CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    
    # EXPLICACIÓN TUTORIAL:
    # Usamos servicios de Docker para tener una base de datos MongoDB real
    # corriendo durante los tests, igual que en tu entorno local.
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # EXPLICACIÓN TUTORIAL:
    # Definimos las variables de entorno necesarias para que NextAuth
    # y MongoDB funcionen en el entorno de GitHub.
    - name: Run CI (Lint + Build + Tests)
      run: npm run build
      env:
        MONGODB_URI: mongodb://localhost:27017/pwa-tests
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret-123' }}
        NEXTAUTH_URL: http://localhost:3000
        AUTH_TRUST_HOST: "true"
        NEXT_PUBLIC_TEST_ENV: "true"

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
